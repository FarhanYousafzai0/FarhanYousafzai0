      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .badgeText { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .meta { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
